%%html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dance Choreography Finder & Stager</title>
    <style>
        :root { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #ffffff; 
            --text-muted: #aaaaaa; 
            --accent-color: #ff4757; 
            --border-color: #333333; 
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 15px; -webkit-text-size-adjust: 100%; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent-color); font-size: 2rem; margin-bottom: 10px; }
        .search-section { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box input { flex: 1; min-width: 200px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: #2d2d2d; color: white; font-size: 1rem; }
        .btn { padding: 0 20px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; height: 45px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-search { background-color: var(--accent-color); color: white; flex-grow: 1; }
        .btn-refresh { background-color: #2f3542; color: white; display: none; flex-grow: 1; } 
        
        .filters { display: flex; flex-wrap: wrap; gap: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 140px; }
        .filter-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; }
        .filter-group select { padding: 10px; border-radius: 6px; background-color: #2d2d2d; color: white; border: 1px solid var(--border-color); cursor: pointer; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        /* 비디오 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.2s; cursor: pointer; }
        .video-card:hover { transform: translateY(-3px); }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px; }
        .video-title { font-size: 0.95rem; font-weight: bold; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .channel-name { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .video-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .status-message { text-align: center; font-size: 1.1rem; color: var(--text-muted); margin-top: 40px; width: 100%; } 

        /* 동선 작업실(Workspace) 스타일 */
        .workspace { display: none; background-color: var(--card-bg); border: 2px solid var(--accent-color); border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        .workspace-title { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px; gap: 10px; }
        .workspace-layout { display: flex; gap: 20px; flex-direction: column; } /* 모바일 기본: 세로 배치 */
        .video-side { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .stage-side { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        
        .player-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 8px; overflow: hidden; background: #000; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; transition: transform 0.3s ease; }
        
        /* 파트 탭 제어 */
        .part-section { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .part-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .part-tab { padding: 6px 12px; background: #2d2d2d; border: 1px solid var(--border-color); color: white; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .part-tab.active { background: var(--accent-color); border-color: var(--accent-color); }
        .part-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-small { height: 35px; padding: 0 12px; font-size: 0.8rem; border-radius: 6px; flex: 1; min-width: 100px; }

        /* 스테이지(그리드) */
        .stage-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .dancer-form { display: flex; gap: 6px; width: 100%; }
        .dancer-form input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: #2d2d2d; color: white; font-size: 0.9rem; }
        .dancer-form .btn-small { flex: none; width: 80px; }
        
        /* 스테이지 높이를 모바일 환경에 맞춰 살짝 줄임 */
        .stage-floor { position: relative; width: 100%; height: 340px; background-color: #1a1a1a; border: 2px solid #444; border-radius: 8px; overflow: hidden; box-sizing: border-box; touch-action: none; /* 모바일 브라우저 기본 스크롤 방지 */
            background-image: radial-gradient(#333 15%, transparent 16%), radial-gradient(#333 15%, transparent 16%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        .stage-floor::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; border-left: 1px dashed rgba(255, 71, 87, 0.4); pointer-events: none; }
        .stage-floor::after { content: ''; position: absolute; left: 0; right: 0; top: 50%; border-top: 1px dashed rgba(255, 71, 87, 0.4); pointer-events: none; }

        /* 댄서 마커 - 모바일 터치를 위해 크기 소폭 확장 및 touch-action 추가 */
        .dancer-marker { position: absolute; width: 44px; height: 44px; border-radius: 50%; background-color: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; cursor: move; user-select: none; -webkit-user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transform: translate(-50%, -50%); border: 2px solid white; touch-action: none; }
        .dancer-name-tag { position: absolute; bottom: -22px; white-space: nowrap; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: #fff; border: 1px solid #444; pointer-events: none; }
        .dancer-delete { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-weight: bold; border: 1px solid #000; z-index: 10; }

        /* 데스크탑 및 태블릿 가로 화면용 미디어 쿼리 (가로 폭이 넓어지면 양옆 배치) */
        @media (min-width: 769px) {
            body { padding: 20px; }
            h1 { font-size: 2.5rem; }
            .search-box { flex-wrap: nowrap; }
            .btn-search, .btn-refresh { flex-grow: 0; }
            .workspace-layout { flex-direction: row; }
            .video-side { flex: 1; }
            .stage-side { flex: 1.2; }
            .stage-floor { height: 420px; }
            .dancer-form { width: auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Dance Finder & Stager</h1>
        <p style="font-size:0.9rem; margin:0; color:var(--text-muted);">원하는 안무 영상을 찾고, 스마트폰이나 패드로 동선을 직접 배치해 보세요.</p>
    </header>
    <main>
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="genreInput" placeholder="춤 장르 입력 (예: K-pop, HipHop)">
                <button class="btn btn-search" onclick="initialSearch()">검색</button>
                <button class="btn btn-refresh" id="refreshBtn" onclick="refreshVideos()">🔄 새로고침</button>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label for="videoType">동영상 형태</label>
                    <select id="videoType">
                        <option value="all">전체 비디오</option>
                        <option value="shorts">Shorts (쇼츠)</option>
                        <option value="normal">일반 동영상</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="timeRange">기간 및 정렬 조건</label>
                    <select id="timeRange">
                        <option value="today">당일 업로드 (최신순)</option>
                        <option value="week">최근 1주일</option>
                        <option value="month">최근 한 달</option>
                        <option value="year">올해 업로드</option>
                        <option value="allTime">기간 전체</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="regionType">국가 우선순위</label>
                    <select id="regionType">
                        <option value="all">제한 없음</option>
                        <option value="ko">한국 영상 우선</option>
                        <option value="en">외국 영상 우선</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="workspace" id="workspaceContainer">
            <div class="workspace-title">
                <h2 id="activeVideoTitle" style="margin:0; font-size:1.1rem; max-width:70%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🎬 동선 제작 중</h2>
                <button class="btn btn-small" style="background:#2f3542; color:white; flex:none; min-width:auto;" onclick="closeWorkspace()">닫기 ✖</button>
            </div>
            <div class="workspace-layout">
                <div class="video-side">
                    <div class="player-container">
                        <iframe id="youtubePlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    
                    <button class="btn" id="mirrorBtn" onclick="toggleMirror()" style="background:#2f3542; color:white; width:100%; height:42px; font-size:0.9rem; border:1px solid var(--border-color);">🪞 영상 좌우반전 (Mirror Off)</button>
                    
                    <div class="part-section">
                        <h3 style="margin-top:0; font-size:1rem; color:var(--accent-color);">📌 파트 시퀀스 타임라인</h3>
                        <div class="part-tabs" id="partTabs"></div>
                        <div class="part-controls">
                            <button class="btn btn-small" style="background:#2f3542; color:white;" onclick="addNewPart()">➕ 파트 추가</button>
                            <button class="btn btn-small" style="background:#333; color:#ff4757; border:1px solid #444;" onclick="deleteCurrentPart()">🗑️ 삭제</button>
                        </div>
                    </div>
                </div>
                <div class="stage-side">
                    <div class="stage-header">
                        <h3 style="margin:0; font-size:1rem;">🕺 STAGE FLOOR</h3>
                        <div class="dancer-form">
                            <input type="text" id="dancerNameInput" placeholder="댄서 이름/번호" onkeypress="if(event.key==='Enter') addDancer()">
                            <button class="btn btn-small btn-search" onclick="addDancer()">등록</button>
                        </div>
                    </div>
                    <div class="stage-floor" id="stageFloor"></div>
                    <p style="margin:0; font-size:0.75rem; color:var(--text-muted);">* 마커를 터치/드래그하여 움직이세요. 우측 상단 [×]로 제거합니다.</p>
                </div>
            </div>
        </div>

        <div class="video-grid" id="videoGrid">
            <div class="status-message">장르를 입력하고 검색을 시작해 주세요!</div>
        </div>
    </main>
</div>

<script>
    const API_KEY = 'AIzaSyCWKtwmM-i0XGvSlAafzk8mOL423Jefb0Q'; 

    let nextPageToken = ''; 
    let currentQuery = '';
    let choreographyData = {}; 
    let currentVideoId = '';
    let isVideoMirrored = false;

    function initialSearch() { nextPageToken = ''; fetchDanceVideos(); }
    function refreshVideos() { fetchDanceVideos(nextPageToken); }

    async function fetchDanceVideos(pageToken = '') {
        const genreInput = document.getElementById('genreInput').value.trim();
        const videoType = document.getElementById('videoType').value;
        const timeRange = document.getElementById('timeRange').value;
        const regionType = document.getElementById('regionType').value;
        const videoGrid = document.getElementById('videoGrid');
        const refreshBtn = document.getElementById('refreshBtn');

        if (!genreInput) { alert('장르를 입력해 주세요!'); return; }
        videoGrid.innerHTML = '<div class="status-message">조건에 맞는 최적의 안무 영상을 탐색 중입니다...</div>';
        
        const searchQuery = `${genreInput} choreography`;
        let publishedAfter = '';
        const now = new Date();
        
        if (timeRange === 'today') { now.setHours(0,0,0,0); publishedAfter = now.toISOString(); } 
        else if (timeRange === 'week') { now.setDate(now.getDate() - 7); publishedAfter = now.toISOString(); } 
        else if (timeRange === 'month') { now.setDate(now.getDate() - 30); publishedAfter = now.toISOString(); } 
        else if (timeRange === 'year') { publishedAfter = `${new Date().getFullYear()}-01-01T00:00:00Z`; }

        const order = (timeRange === 'today') ? 'date' : 'relevance';
        let videoDurationParam = 'any';
        if (videoType === 'shorts') videoDurationParam = 'short';
        else if (videoType === 'normal') videoDurationParam = 'medium';

        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&type=video&order=${order}&videoDuration=${videoDurationParam}&maxResults=50&key=${API_KEY}`;
        if (publishedAfter) url += `&publishedAfter=${publishedAfter}`;
        if (pageToken) url += `&pageToken=${pageToken}`; 
        if (regionType !== 'all') url += `&relevanceLanguage=${regionType}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            let videos = data.items;
            nextPageToken = data.nextPageToken || ''; 

            if (!videos || videos.length === 0) { 
                videoGrid.innerHTML = '<div class="status-message">검색 결과가 없습니다.</div>'; 
                return; 
            }

            const videoIds = videos.map(item => item.id.videoId).join(',');
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics,contentDetails,snippet&id=${videoIds}&key=${API_KEY}`;
            const statsResponse = await fetch(statsUrl);
            const statsData = await statsResponse.json();
            
            const videoDetailsMap = {};
            statsData.items.forEach(item => {
                videoDetailsMap[item.id] = { 
                    viewCount: parseInt(item.statistics.viewCount || 0), 
                    duration: item.contentDetails.duration,
                    defaultAudioLanguage: item.snippet.defaultAudioLanguage || '',
                    title: item.snippet.title 
                };
            });

            if (videoType === 'shorts') {
                videos = videos.filter(video => {
                    const detail = videoDetailsMap[video.id.videoId];
                    if (!detail) return false;
                    const matches = detail.duration.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
                    if (!matches) return false;
                    return (parseInt(matches[1] || '0') * 60 + parseInt(matches[2] || '0')) <= 60;
                });
            }

            if (pageToken === '') videoGrid.innerHTML = '';
            
            videos.forEach(video => {
                const videoId = video.id.videoId;
                const title = videoDetailsMap[videoId]?.title || video.snippet.title;
                const channelTitle = video.snippet.channelTitle;
                const thumbnail = video.snippet.thumbnails.medium.url;
                const publishedAt = new Date(video.snippet.publishedAt).toLocaleDateString();
                const viewCount = videoDetailsMap[videoId] ? videoDetailsMap[videoId].viewCount.toLocaleString() : '0';
                const escapedTitle = title.replace(/['"]/g, " ");

                videoGrid.innerHTML += `
                    <div class="video-card" onclick="openWorkspace('${videoId}', '${escapedTitle}')">
                        <div class="thumbnail-container"><img src="${thumbnail}"></div>
                        <div class="video-info">
                            <div class="video-title">${title}</div>
                            <div class="channel-name">${channelTitle}</div>
                            <div class="video-meta"><span>👁️ ${viewCount}회</span><span>📅 ${publishedAt}</span></div>
                        </div>
                    </div>`;
            });
            refreshBtn.style.display = 'block'; 
        } catch (error) {
            videoGrid.innerHTML = `<div class="status-message" style="color: var(--accent-color);">오류: ${error.message}</div>`;
        }
    }

    function openWorkspace(videoId, videoTitle) {
        currentVideoId = videoId;
        document.getElementById('activeVideoTitle').innerText = `🎬 동선 제작 중: ${videoTitle}`;
        document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        resetMirrorState();

        if (!choreographyData[videoId]) {
            choreographyData[videoId] = { currentPartIndex: 0, parts: [{ name: "파트 1", dancers: [] }] };
        }
        document.getElementById('workspaceContainer').style.display = 'block';
        document.getElementById('workspaceContainer').scrollIntoView({ behavior: 'smooth' });
        renderParts();
        renderStage();
    }

    function closeWorkspace() {
        document.getElementById('workspaceContainer').style.display = 'none';
        document.getElementById('youtubePlayer').src = '';
        currentVideoId = '';
        resetMirrorState();
    }

    function toggleMirror() {
        const player = document.getElementById('youtubePlayer');
        const mirrorBtn = document.getElementById('mirrorBtn');
        isVideoMirrored = !isVideoMirrored;
        if (isVideoMirrored) {
            player.style.transform = 'scaleX(-1)';
            mirrorBtn.innerText = '🪞 영상 좌우반전 (Mirror On)';
            mirrorBtn.style.background = 'var(--accent-color)';
        } else {
            player.style.transform = 'scaleX(1)';
            mirrorBtn.innerText = '🪞 영상 좌우반전 (Mirror Off)';
            mirrorBtn.style.background = '#2f3542';
        }
    }

    function resetMirrorState() {
        isVideoMirrored = false;
        const player = document.getElementById('youtubePlayer');
        const mirrorBtn = document.getElementById('mirrorBtn');
        if (player && mirrorBtn) {
            player.style.transform = 'scaleX(1)';
            mirrorBtn.innerText = '🪞 영상 좌우반전 (Mirror Off)';
            mirrorBtn.style.background = '#2f3542';
        }
    }

    function renderParts() {
        const partTabs = document.getElementById('partTabs');
        partTabs.innerHTML = '';
        choreographyData[currentVideoId].parts.forEach((part, index) => {
            const tab = document.createElement('button');
            tab.className = `part-tab ${index === choreographyData[currentVideoId].currentPartIndex ? 'active' : ''}`;
            tab.innerText = part.name;
            tab.onclick = () => {
                choreographyData[currentVideoId].currentPartIndex = index;
                renderParts(); renderStage();
            };
            partTabs.appendChild(tab);
        });
    }

    function addNewPart() {
        const videoData = choreographyData[currentVideoId];
        const clonedDancers = JSON.parse(JSON.stringify(videoData.parts[videoData.currentPartIndex].dancers));
        videoData.parts.push({ name: `파트 ${videoData.parts.length + 1}`, dancers: clonedDancers });
        videoData.currentPartIndex = videoData.parts.length - 1;
        renderParts(); renderStage();
    }

    function deleteCurrentPart() {
        const videoData = choreographyData[currentVideoId];
        if (videoData.parts.length <= 1) { alert('최소 1개의 파트는 존재해야 합니다.'); return; }
        if(confirm(`현재 파트를 정말 삭제하시겠습니까?`)) {
            videoData.parts.splice(videoData.currentPartIndex, 1);
            videoData.currentPartIndex = Math.max(0, videoData.currentPartIndex - 1);
            renderParts(); renderStage();
        }
    }

    function addDancer() {
        const input = document.getElementById('dancerNameInput');
        const dancerName = input.value.trim();
        if(!dancerName) { alert('이름을 입력하세요!'); return; }
        choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex].dancers.push({
            id: Date.now() + Math.random().toString(36).substr(2, 5), name: dancerName, x: 50, y: 50  
        });
        input.value = ''; renderStage();
    }

    function deleteDancer(id) {
        const currentPart = choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex];
        currentPart.dancers = currentPart.dancers.filter(dancer => dancer.id !== id);
        renderStage();
    }

    function renderStage() {
        const stageFloor = document.getElementById('stageFloor');
        stageFloor.innerHTML = ''; 
        choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex].dancers.forEach(dancer => {
            const marker = document.createElement('div');
            marker.className = 'dancer-marker';
            marker.style.left = `${dancer.x}%`; marker.style.top = `${dancer.y}%`;
            marker.innerHTML = `
                ${dancer.name.substring(0, 2)}
                <div class="dancer-name-tag">${dancer.name}</div>
                <div class="dancer-delete">×</div>
            `;
            marker.querySelector('.dancer-delete').onpointerdown = (e) => {
                e.stopPropagation(); deleteDancer(dancer.id);
            };
            bindDragEvent(marker, dancer.id);
            stageFloor.appendChild(marker);
        });
    }

    /* 📱 호환성 핵심: 마우스와 모바일 터치를 통합 지원하는 Pointer Events 처리 */
    function bindDragEvent(element, dancerId) {
        element.onpointerdown = function(event) {
            if(event.target.className === 'dancer-delete') return;
            
            event.preventDefault();
            // 포인터 캡처를 걸어 손가락이 마커 밖으로 나가도 드래그가 유지되도록 설정 (사파리, iOS 필수 크래시 방지)
            element.setPointerCapture(event.pointerId);
            
            const stageFloor = document.getElementById('stageFloor');
            const rect = stageFloor.getBoundingClientRect();

            function moveAt(clientX, clientY) {
                let percentX = ((clientX - rect.left) / rect.width) * 100;
                let percentY = ((clientY - rect.top) / rect.height) * 100;

                percentX = Math.max(0, Math.min(percentX, 100));
                percentY = Math.max(0, Math.min(percentY, 100));

                element.style.left = `${percentX}%`;
                element.style.top = `${percentY}%`;

                const dancer = choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex].dancers.find(d => d.id === dancerId);
                if(dancer) { dancer.x = percentX; dancer.y = percentY; }
            }

            function onPointerMove(event) { moveAt(event.clientX, event.clientY); }
            document.addEventListener('pointermove', onPointerMove);

            document.addEventListener('pointerup', function onPointerUp(e) {
                document.removeEventListener('pointermove', onPointerMove);
                document.removeEventListener('pointerup', onPointerUp);
                try { element.releasePointerCapture(e.pointerId); } catch(err) {}
            });
        };
        element.ondragstart = function() { return false; };
    }
</script>
</body>
</html>
